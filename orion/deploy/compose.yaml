services:
  prometheus:
    image: prom/prometheus:latest
    container_name: orion-prometheus
    restart: unless-stopped
    volumes:
      # :Z relabels for SELinux — required on Fedora/RHEL/CentOS rootless
      # podman. Harmless on Ubuntu/Debian where SELinux isn't enforcing.
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    extra_hosts:
      # Reach the orion exporter running on the host. podman 4.5+
      # resolves host.containers.internal via host-gateway. The
      # host.docker.internal alias is retained so prometheus.yml
      # written for either tool keeps working.
      - "host.containers.internal:host-gateway"
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: orion-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      # Anonymous admin access for the local-dev sidecar. Lock this down
      # before pointing the stack at a shared machine.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      # :Z relabels for SELinux on rootless podman (Fedora/RHEL/CentOS).
      - ./grafana/provisioning:/etc/grafana/provisioning:ro,Z
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro,Z
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  prometheus-data:
  grafana-data:
