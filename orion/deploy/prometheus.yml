global:
  scrape_interval: 5s        # dev default; raise for long runs to reduce RPC load
  evaluation_interval: 5s

scrape_configs:
  # The orion metrics exporter runs on the host (`orion metrics serve
  # --port 9464`). From inside the Prometheus container we reach the
  # host via host.containers.internal (podman's native name; also
  # aliased as host.docker.internal in compose.yaml for compatibility).
  # The alias wiring is in compose.yaml's extra_hosts.
  - job_name: orion
    static_configs:
      - targets: ["host.containers.internal:9464"]
        labels:
          profile: swarm
