services:
  prometheus:
    image: prom/prometheus:latest
    container_name: orion-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    extra_hosts:
      # Lets the container reach the orion exporter running on the host.
      # Linux needs this explicitly; on Docker Desktop (macOS/Windows)
      # host.docker.internal is pre-wired and this line is a no-op.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: orion-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      # Anonymous admin access for the local-dev sidecar. Lock this down
      # before pointing the stack at a shared machine.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  prometheus-data:
  grafana-data:
