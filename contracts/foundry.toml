[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.19"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read", path = "../orion/vendor" }]
allow_paths = ["../orion/vendor"]
# storage-incentives is vendored in orion/vendor and compiled via remapping
auto_detect_remappings = true

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
